# Configuration des sources de scraping ImmoScan
# Source unique : LeBonCoin (vente + location)

sources:
  leboncoin:
    enabled: true
    types:
      - vente
      - location
    base_urls:
      vente: "https://www.leboncoin.fr/recherche?category=9&locations=Besan%C3%A7on_25000&real_estate_type=2&price=120000-160000&rooms=2-3"
      location: "https://www.leboncoin.fr/recherche?category=10&locations=Besan%C3%A7on_25000&real_estate_type=2&rooms=2-3"
    selectors:
      listing_container: "div[data-test-id='adcard_container']"
      title: "p[data-test-id='ad-title']"
      price: "span[data-test-id='price']"
      surface: "p[data-test-id='ad-param-surface']"
      rooms: "p[data-test-id='ad-param-rooms']"
      location: "p[data-test-id='ad-address']"
      link: "a[data-test-id='ad-link']"
      description: "div[data-test-id='ad-description']"
      dpe: "div[data-test-id='ad-dpe']"
      photos: "img[data-test-id='ad-photo']"
    pagination:
      param: "page"
      max_pages: 5
    rate_limit:
      delay_min: 2
      delay_max: 5
    frequency:
      vente: "0 7,11,13,16,18,20 * * *"  # 6x/jour
      location: "0 6 * * *"               # 1x/jour

# Configuration globale du scraping
global:
  user_agent_rotation: true
  respect_robots_txt: true
  max_retries: 3
  retry_delay: 10
  timeout: 30
