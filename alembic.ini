# Alembic configuration for ImmoScan.
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts.
script_location = src/db/migrations

# Template used to generate migration files.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with the project root so that `src` imports work.
prepend_sys_path = .

# Timezone for migration file timestamps.
timezone = Europe/Paris

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# in the versions directory.
sourceless = false

# Version path separator; use 'os' for os.pathsep, or provide a specific char.
version_path_separator = os

# sqlalchemy.url is loaded dynamically in env.py from DATABASE_URL.
# Do not set it here to avoid hardcoding credentials.
# sqlalchemy.url = postgresql://immoscan:password@localhost:5432/immoscan

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
